<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso al Sistema Electoral</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f6f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 40px 36px 28px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 380px;
        }

        h1 {
            margin: 0 0 28px;
            text-align: center;
            font-size: 1.35rem;
            color: #1a1a1a;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 18px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            font-size: 1rem;
            background: #f7f9fc;
            transition: border-color 0.2s, background 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #2563eb;
            background: white;
        }

        button {
            width: 100%;
            padding: 11px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #1d4ed8; }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            text-align: center;
        }

        .aviso {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #eee;
            font-size: 0.72rem;
            color: #888;
            text-align: center;
            line-height: 1.5;
        }
        .aviso a {
            color: #888;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Acceso al Sistema Electoral</h1>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" name="usuario" autocomplete="username" required autofocus>

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>

            <button type="submit">Entrar</button>
        </form>

        <div class="aviso">
            Este sistema es un desarrollo independiente<br>
            propiedad de <strong>{{ owner }}</strong><br>
            <a href="tel:{{ telefono }}">{{ telefono }}</a>
        </div>
    </div>

</body>
</html>
